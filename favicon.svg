<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <!-- Matching your core gradient theme -->
        <linearGradient id="sj-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="50%" stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#06B6D4" />
        </linearGradient>
    </defs>
    <!-- Dark glassmorphic background box -->
    <rect width="100" height="100" rx="24" fill="#0F172A" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2"/>
    <!-- Centered SJ text with gradient (no dot) -->
    <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="'Outfit', -apple-system, sans-serif" font-weight="900" font-size="44" fill="url(#sj-grad)">SJ</text>
</svg>
